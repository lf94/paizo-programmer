<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3"
      crossorigin="anonymous"
    />
    <!-- Bootstrap Script -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p"
      crossorigin="anonymous"
      defer
    ></script>
    <!-- Custom style and script -->
    <link rel="stylesheet" href="style.css" />
    <script src="./script.js" defer></script>
    <title>Home</title>
  </head>
  <body>
    <div class="container">
      <div class="card">
        <div class="card-body">
          <textarea id="question" class="card-text hidden" placeholder="Question?"></textarea>
        </div>
        <div class="fact_and_rule_container draggable-container">
          <textarea
            name=""
            id="fact"
            class="draggable"
            cols="30"
            rows="3"
            placeholder="fact1"
            draggable="true"
            touch="true"
          ></textarea>
          <textarea
            name=""
            id="rule"
            class="draggable"
            cols="30"
            rows="3"
            placeholder="rule1"
            draggable="true"
            touch="true"
          ></textarea>
        </div>
      </div>
    </div>
    <nav class="nav nav-tabs justify-content-center navbar-light bg-light">
      <ul class="navbar-nav">
        <li class="nav-item dropdown">
          <a
            class="nav-link dropdown-toggle btn btn-outline-primary"
            href="#"
            id="navbarDropdown btn_add"
            role="button"
            data-bs-toggle="dropdown"
            aria-expanded="false"
          ></a>
          <ul class="dropdown-menu" aria-labelledby="navbarDropdown">
            <li><a id="btn_add_question" class="dropdown-item" href="#">Add Question</a></li>
            <li><a id="btn_add_fact" class="dropdown-item" href="#">Add Fact</a></li>
            <li><a id="btn_add_rule" class="dropdown-item" href="#">Add Rule</a></li>
          </ul>
        </li>
      </ul>
    </nav>
  </body>
</html>
